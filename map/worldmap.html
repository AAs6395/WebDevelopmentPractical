<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clickable World Map</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
}

h1{
    margin-top:20px;
}

img{
    width:800px;
    border:4px solid black;
}
</style>
</head>

<body>

<h1>Clickable World Map</h1>
<p>Click on any continent to learn more about it.</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg "
     usemap="#worldmap">

<map name="worldmap">

<!-- North America -->
<area shape="rect"
coords="70,80,200,200"
href="https://en.wikipedia.org/wiki/North_America"
alt="North America"
target="_blank">

<!-- South America -->
<area shape="rect"
coords="200,220,300,380"
href="https://en.wikipedia.org/wiki/South_America"
alt="South America"
target="_blank">

<!-- Europe -->
<area shape="circle"
coords="420,120,40"
href="https://en.wikipedia.org/wiki/Europe"
alt="Europe"
target="_blank">

<!-- Africa -->
<area shape="rect"
coords="420,180,520,350"
href="https://en.wikipedia.org/wiki/Africa"
alt="Africa"
target="_blank">

<!-- Asia -->
<area shape="poly"
coords="500,80,700,100,750,200,650,250,520,180"
href="https://en.wikipedia.org/wiki/Asia"
alt="Asia"
target="_blank">

<!-- Australia -->
<area shape="rect"
coords="650,350,760,420"
href="https://en.wikipedia.org/wiki/Australia"
alt="Australia"
target="_blank">

</map>

</body>
</html>
