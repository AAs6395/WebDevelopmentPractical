<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Car Showcase</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f4f4;
}

h1{
    margin-top:20px;
}

img{
    width:800px;
    border:4px solid black;
}
</style>

</head>
<body>

<h1>Interactive Car Showcase</h1>
<p>Click on different parts of the car to learn more.</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/7/7f/Toyota_Corolla_2019.jpg"
usemap="#carparts" alt="Car Image">

<map name="carparts">

<!-- Wheel -->
<area shape="circle"
coords="250,380,60"
href="wheel.html"
alt="Car Wheel">

<!-- Engine -->
<area shape="rect"
coords="450,220,600,320"
href="engine.html"
alt="Car Engine">

<!-- Interior -->
<area shape="poly"
coords="300,200,350,170,450,170,500,200,450,250,350,250"
href="interior.html"
alt="Car Interior">

</map>

</body>
</html>
