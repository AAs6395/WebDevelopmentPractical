<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Menu</title>
    <style>
        body{
            font-family:Arial ,sans-serif;
        }
        .container{
            width:600px;
            margin:50px auto;
            background: #f5f0c8;
            padding:20px;
            border:5px solid #c85c5c
        }
        h1{
         text-align:center;
         padding:10px;
         border:3px solid #c85c5c;
        }
        table{
           width:100%;
           margin-top:10px; 
           border-collapse:collapse;
        }
        th{
        vertical-align:top;
         padding:15px;
         border:3px solid #c85c5c;
        }
        .meal{
            font-weight:bold;
            font-size: 20px;
            vertical-align: top;
        }
        .monday{
         font-size:20px;
         text-align:center;
         writing-mode:vertical-rl;
         text-orientation:upright;
        }
    </style>
</head>
<body>
    <div class="container">
        <table>
            <tr>
                <td colspan="3">My Daily Menu</td>
            </tr>
            <tr>
            <td rowspan="3" class="monday">Monday</td>
            <td class="meal">Breakfast</td>
            <td>Orange juice<br>
            Toast<br>
            Black coffee
           </td>
           </tr>
           <tr>
            <td class="meal">Lunch</td>
            <td> Tuna sandwich<br>
            Apple</td>
           </tr>
           <tr>
            <td class="meal">Dinner</td>
            <td>Hamburger<br>
            steak<br>
            MAshed<br>
            potatoes<br>
            Green beans<br>
            JEllo
        </td>
           </tr>
        </table>
    </div>
    
</body>
</html>
